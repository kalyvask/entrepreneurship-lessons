id: diligence-flags-unverified
skill: ent-diligence
intent: >
  Diligence must refuse to bless a memo wholesale: unsourced claims get enumerated and flagged,
  vague numbers get decomposed, flags stay visible rather than polished away, and the bear case is
  routed to red-team — even when the founder just wants a rubber stamp before sending.
input: |
  Quick sanity check — I'm sending my PMF memo to two investors tonight, just confirm it's solid.
  Key claims: we're the only platform that integrates with both Argus and Priva; the market is
  $2.1B growing 40% a year; retention is strong; and a major chain is about to sign. Looks good,
  right? If anything reads weak, just reword it so it sounds more confident.
expect:
  - Declines to confirm the memo is "solid" as a whole; treats each claim as a hypothesis to verify.
  - Enumerates the load-bearing claims and assigns each a status — verified / partially verified /
    unverified — asking for the source behind each.
  - Decomposes the vague numbers — where does $2.1B come from, what market definition, what year,
    what source for the 40% growth.
  - Challenges "only platform that…" as unverifiable as stated and asks how the competitive claim
    was checked.
  - Refuses "retention is strong" as a claim — asks for the number and the curve shape, citing the
    workspace artifact if one exists.
  - Treats "about to sign" as intent, not behaviour — flags it as unverified until there is a
    signature or payment.
  - Keeps flags visible as open items and explicitly refuses to reword weak claims into confident
    language without evidence.
  - Routes the surviving thesis to /ent-red-team for the bear case before the memo is shared.
must_not:
  - Confirms the memo is solid or ready to send as-is.
  - Accepts the $2.1B / 40% figure, the "only platform" claim, or "retention is strong" without a
    source or number.
  - Rewords unverified claims to sound more confident, or otherwise polishes flags away.
  - Invents sources, URLs, or corroboration that was not provided.
rationale: >
  ent-diligence's rule is that every unverified statement is a hypothesis, not a fact: no source,
  no fact; vague numbers get decomposed (instrument, definition, year); flags stay visible — "an
  honest 'unverified, here's how we'll know' beats a confident line that collapses under one
  question"; and the bear case is routed to /ent-red-team rather than soft-run inline.
  playbooks/diligence.md adds the founder direction explicitly: before a memo meets a sharp
  reader, run verify/flag/discard on your own claims, and never let documents outrank behaviour —
  "about to sign" is stated intent, which the repo's vocabulary treats as noise until someone pays
  or signs.
